sonar.projectKey=sight-backend
sonar.projectName=Sight — Backend
sonar.projectVersion=0.1.0

sonar.sources=src
sonar.tests=tests

sonar.sourceEncoding=UTF-8
sonar.python.version=3.13

sonar.python.coverage.reportPaths=coverage.xml

sonar.exclusions=\
    alembic/versions/**,\
    ai_docs/**,\
    uploads/**,\
    logs/**,\
    scripts/**,\
    docs/**,\
    **/__pycache__/**,\
    **/*.pyc,\
    coverage.xml,\
    .venv/**,\
    .mypy_cache/**,\
    .ruff_cache/**,\
    .pytest_cache/**

sonar.cpd.exclusions=
sonar.coverage.exclusions=
