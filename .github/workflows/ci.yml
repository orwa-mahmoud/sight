name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sight_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Enable pgvector
        run: PGPASSWORD=postgres psql -h localhost -U postgres -d sight_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Type check
        run: uv run mypy src/

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/sight_test
          DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/sight_test
          JWT_SECRET_KEY: ci-test-secret
          APP_ENV: test
        run: uv run alembic upgrade head

      - name: Tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/sight_test
          DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/sight_test
          JWT_SECRET_KEY: ci-test-secret
          APP_ENV: test
        run: uv run pytest --tb=short -q --cov=src --cov-report=xml

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build
